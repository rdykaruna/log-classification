<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Classifier API</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .container { background-color: white; padding: 2em; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); text-align: center; }
        h1 { color: #333; }
        input[type="file"] { margin: 1em 0; }
        button { padding: 0.75em 1.5em; border: none; border-radius: 4px; background-color: #007bff; color: white; font-size: 1em; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #response-container { margin-top: 2em; text-align: left; background-color: #eee; padding: 1em; border-radius: 4px; display: none; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Log Classifier API</h1>
        <p>Upload a CSV file with "source" and "log_message" columns to classify your logs.</p>
        <form id="uploadForm">
            <input type="file" id="csvFile" accept=".csv" required>
            <button type="submit">Classify Logs</button>
        </form>
        <div id="response-container">
            <h3>API Response</h3>
            <pre id="responseContent"></pre>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Prevent default form submission

            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a CSV file to upload.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const responseContainer = document.getElementById('response-container');
            const responseContent = document.getElementById('responseContent');

            try {
                // Make a POST request to your API endpoint
                const response = await fetch('http://127.0.0.1:8000/classify/', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Something went wrong with the API.');
                }

                // The API returns a CSV file, so we read it as text
                const csvText = await response.text();
                
                responseContent.textContent = csvText;
                responseContainer.style.display = 'block';

            } catch (error) {
                responseContent.textContent = `Error: ${error.message}`;
                responseContainer.style.display = 'block';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
